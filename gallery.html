<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gallery for Bean & Brew cafe">
    <link rel="stylesheet" href="style.css">
    <title>Coffee Gallery</title>
</head>

<body>
     <section>
        <!-- loads the hamburger logo for the hamburger navigation-->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

        <!-- Top right hamburger Navigation Menu -->
        <div class="topnav">
        <div id="myLinks">
              <a href="index.html">Home</a>
            <a href="aboutUs.html">About Us</a>
            <a href="gallery.html">Gallery</a>
            <a href="menu.html">Menu</a>
            <a href="booking.html">Booking</a>
            <a href="contact.html">Contact Us</a>
        </div>
        <!-- Hamburger navigation bar -->
        <a href="javascript:void(0);" class="icon" onclick="myFunction()">
            <i class="fa fa-bars"></i>
        </a>
        </div>
        <script>
            function myFunction() {
            var x = document.getElementById("myLinks");
            x.style.display = x.style.display === "block" ? "none" : "block";
            }
        </script>
    </section>

    <section>
    <div class="heading">
        <h1>
            Gallery
        </h1>
    </div>
    </section>

    <div class="container">
        <p>Pictures and video of the Cafe
        </p>
    </div>

    <div class="galleryImages">
        <img src=images/coffee.jpeg alt="a coffee image" width="350" height="250">
        <img src=images/coffee2.jpeg alt="a coffee image with a window view" width="350" height="250">
        <video width="350" height="250" controls>
            <source src="videos/coffeebean.mp4" type="video/mp4">
        </video>
    </div>

    <section>
    <!-- Navigation bar -->
    <nav>
        <div class="navbarContainer">
            <div class="buttonNav">
            <a href="aboutUs.html">About</a>
            </div>
            <div class="buttonNav">
                <a href="index.html">Home</a>
            </div>
            <div class="buttonNav">
                <a href="menu.html">Menu</a>
            </div>
            <div class="buttonNav">
            <a href="booking.html">Booking</a>
            </div>
            </div>
        </nav>
    </section>

    <section>
        <div class="imageLogo">
            <img src="images/coffeelogo.jpeg" alt="a coffee logo image" width="150" height="150">
    </div>
    </section>
    
    <section>
        <div class="socialMedia">
            <a href="https://www.instagram.com/cafecoolcake/" target="_blank">
            <img src="images/instagram.png" alt="Instagram social media link">
            </a>
        </div>
    </section>
</body>
</html>
